<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Ask Lizzie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
body{
  font-family:'Inter',system-ui,Arial,sans-serif;
  background:#FAFAFA;color:#000;
  min-height:100vh;min-height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px 24px;
}
.mono{
  width:72px;height:72px;border-radius:16px;
  background:#F2F2F7;
  display:flex;align-items:center;justify-content:center;
  font-family:'New York','Playfair Display',Georgia,serif;
  font-size:28px;font-weight:800;color:#000;
  margin-bottom:28px;letter-spacing:-0.03em;
}
h1{
  font-family:'New York','Playfair Display',Georgia,serif;
  font-size:1.5rem;font-weight:800;
  margin-bottom:10px;letter-spacing:-0.03em;color:#000;
}
p{
  font-size:0.95rem;color:#3A3A3C;line-height:1.6;
  max-width:320px;margin-bottom:28px;font-weight:400;
}
button{
  font-family:'Inter',Arial,sans-serif;font-weight:600;font-size:0.95rem;
  background:#D70015;color:#fff;border:none;border-radius:12px;
  padding:15px 32px;cursor:pointer;min-width:240px;
  transition:background 0.15s ease;
}
button:active{background:#B8000F}
.sub{margin-top:16px;font-size:0.75rem;color:#6D6D72;font-weight:500}
</style>
</head>
<body>
<div class="mono">L</div>
<h1>No connection right now</h1>
<p>Lizzie needs a signal to read your document. Check your connection and try again.</p>
<button onclick="location.reload()">Try again</button>
<p class="sub">Nothing you had open has been lost.</p>
</body>
</html>
